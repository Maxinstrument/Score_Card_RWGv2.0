<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resilient Wealth Group | Weekly Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0E2440; --navy-deep:#0A1A30; --gold:#C2A14D; --gold-soft:#D8BC78;
    --paper:#F4F1E9; --card:#FFFFFF; --ink:#16263D; --muted:#5C6B7E;
    --line:rgba(14,36,64,.12); --line-strong:rgba(14,36,64,.22);
    --good:#2E7D5B; --warn:#B0691F; --field:#FBFAF6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{ font-family:'Hanken Grotesk',system-ui,sans-serif; background:var(--paper); color:var(--ink); line-height:1.5; -webkit-font-smoothing:antialiased; }
  .num{font-variant-numeric:tabular-nums;}

  /* Gate */
  #gate{ position:fixed; inset:0; background:var(--navy-deep); display:flex; align-items:center; justify-content:center; z-index:9999; padding:24px; }
  #gate-card{ background:#0E2440; border:1px solid rgba(194,161,77,.35); border-radius:16px; padding:44px 36px; max-width:380px; width:100%; text-align:center; }
  #gate-logo{ height:70px; margin-bottom:18px; }
  #gate-title{ font-family:'Fraunces',serif; color:var(--gold); font-size:20px; margin:0 0 8px; }
  #gate-sub{ color:rgba(244,241,233,.5); font-size:13px; margin:0 0 26px; }
  #gate-input{ width:100%; padding:13px 16px; background:rgba(255,255,255,.06); border:1px solid rgba(194,161,77,.35); border-radius:8px; color:#fff; font-size:16px; text-align:center; letter-spacing:.1em; margin-bottom:14px; outline:none; }
  #gate-btn{ width:100%; padding:13px; background:var(--gold); color:var(--navy-deep); border:none; border-radius:8px; font-weight:700; font-size:15px; cursor:pointer; }
  #gate-err{ color:#FF6B6B; font-size:13px; margin-top:10px; min-height:16px; }

  /* Masthead */
  .masthead{ background:linear-gradient(160deg,var(--navy),var(--navy-deep)); color:#fff; padding:26px 24px; border-bottom:3px solid var(--gold); }
  .mast-inner{ max-width:1080px; margin:0 auto; display:flex; align-items:center; gap:20px; }
  .mast-logo{ height:60px; }
  .mast-text .brand{ font-family:'Fraunces',serif; color:var(--gold-soft); font-size:12px; letter-spacing:.4px; text-transform:uppercase; margin:0 0 4px; }
  .mast-text h1{ font-family:'Fraunces',serif; font-weight:500; font-size:28px; margin:0; }

  .wrap{ max-width:1080px; margin:0 auto; padding:22px 20px 80px; }

  /* Controls */
  .controls{ display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; margin-bottom:20px; }
  .ctrl{ display:flex; flex-direction:column; gap:4px; }
  .ctrl label{ font-size:11px; letter-spacing:.4px; text-transform:uppercase; color:var(--muted); font-weight:700; }
  .ctrl select{ padding:11px 14px; font-size:15px; border:1px solid var(--line-strong); border-radius:9px; background:#fff; color:var(--ink); min-width:200px; }
  .ctrl .btn{ padding:11px 16px; border-radius:9px; border:none; font-weight:700; font-size:14px; cursor:pointer; font-family:inherit; }
  .btn.navy{ background:var(--navy); color:#fff; }
  .btn.ghost{ background:transparent; color:var(--navy); border:1px solid var(--line-strong); }

  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px 22px; margin-bottom:18px; }
  .eyebrow{ display:flex; align-items:center; gap:10px; margin:0 0 8px; }
  .eyebrow .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); }
  .eyebrow span{ font-size:12px; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted); font-weight:700; }
  h2{ font-family:'Fraunces',serif; font-weight:500; font-size:22px; margin:0 0 12px; color:var(--navy); }
  h3{ font-family:'Fraunces',serif; font-weight:500; font-size:17px; margin:0 0 10px; color:var(--navy); }

  /* Club tracker */
  .club{ background:linear-gradient(160deg,#0E2440,#0A1A30); color:#fff; border:1px solid rgba(194,161,77,.4); }
  .club .eyebrow span{ color:var(--gold-soft); }
  .club-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:14px 0; }
  .club-cell{ background:rgba(255,255,255,.05); border:1px solid rgba(194,161,77,.18); border-radius:10px; padding:12px 14px; }
  .club-k{ font-size:10px; letter-spacing:.5px; text-transform:uppercase; color:rgba(255,255,255,.55); font-weight:700; margin-bottom:6px; }
  .club-v{ font-family:'Fraunces',serif; font-size:22px; }
  .club-bar-wrap{ margin-top:6px; }
  .club-bar-row{ display:flex; justify-content:space-between; font-size:12.5px; color:rgba(255,255,255,.8); margin-bottom:6px; }
  .club-bar-row b{ font-family:'Fraunces',serif; color:var(--gold-soft); font-size:18px; }
  .bar{ height:10px; border-radius:6px; background:rgba(255,255,255,.12); overflow:hidden; }
  .bar-fill{ height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-soft)); border-radius:6px; }
  .club-note{ font-size:11px; color:rgba(255,255,255,.45); margin:12px 0 0; font-style:italic; }
  @media (max-width:760px){ .club-grid{ grid-template-columns:1fr 1fr; } }

  /* My Week (reused look) */
  .myweek{ background:linear-gradient(165deg,#fff,#FBF8F0); border:1px solid var(--gold); border-radius:12px; padding:14px 16px; margin-bottom:14px; }
  .mw-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .mw-title{ font-family:'Fraunces',serif; font-size:16px; color:var(--navy); }
  .mw-summary{ font-size:12px; font-weight:700; color:var(--muted); }
  .mw-summary.all{ color:var(--good); }
  .mw-goal{ margin-bottom:10px; }
  .mw-g-top{ display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:4px; gap:8px; }
  .mw-g-label{ color:var(--ink); font-weight:600; }
  .mw-g-val{ font-variant-numeric:tabular-nums; color:var(--navy); font-weight:700; white-space:nowrap; }
  .mw-goal.hit .mw-g-val{ color:var(--good); }
  .mw-bar{ height:7px; border-radius:5px; background:rgba(14,36,64,.10); overflow:hidden; }
  .mw-bar-fill{ height:100%; background:var(--navy); border-radius:5px; }
  .mw-goal.hit .mw-bar-fill{ background:var(--good); }
  .mw-g-note{ font-size:10.5px; color:var(--warn); margin-top:3px; font-style:italic; }
  .mw-nums{ display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .mw-num{ background:var(--field); border:1px solid var(--line); border-radius:9px; padding:9px 11px; flex:1 0 110px; }
  .mw-num span{ font-size:10px; letter-spacing:.3px; text-transform:uppercase; color:var(--muted); font-weight:700; display:block; }
  .mw-num b{ font-family:'Fraunces',serif; font-size:18px; color:var(--navy); }
  .report-cols > div, .rev-cell, .club-cell, .mw-num{ min-width:0; }

  /* Tables */
  table.grid{ width:100%; border-collapse:collapse; font-size:13px; }
  table.grid th, table.grid td{ border:1px solid var(--line); padding:7px 9px; text-align:center; }
  table.grid th{ background:var(--navy); color:#fff; font-weight:600; font-size:11.5px; }
  th.cs-sort{ cursor:pointer; user-select:none; white-space:nowrap; }
  th.cs-sort:hover{ color:var(--gold-soft); }
  table.grid td:first-child, table.grid th:first-child{ text-align:left; }
  table.grid tfoot td{ font-weight:700; background:#FBF8F0; }
  .two{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .report-cols{ display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start; }
  @media (max-width:760px){ .report-cols{ grid-template-columns:1fr; } }
  .rev-cell{ background:var(--field); border:1px solid var(--line); border-radius:9px; padding:11px 13px; }
  .rev-cell span{ font-size:10.5px; letter-spacing:.3px; text-transform:uppercase; color:var(--muted); font-weight:700; display:block; }
  .rev-cell b{ font-family:'Fraunces',serif; font-size:20px; color:var(--navy); }

  /* Leaderboard */
  .lead{ width:100%; border-collapse:collapse; font-size:13px; }
  .lead th, .lead td{ border-bottom:1px solid var(--line); padding:8px 9px; text-align:center; }
  .lead th{ font-size:10.5px; letter-spacing:.4px; text-transform:uppercase; color:var(--muted); }
  .lead td:first-child, .lead th:first-child{ text-align:left; font-weight:600; }
  .lead .pill{ font-size:10px; font-weight:700; padding:2px 8px; border-radius:5px; }
  .pill.good{ background:rgba(46,125,91,.14); color:var(--good); }
  .pill.warn{ background:rgba(176,105,31,.14); color:var(--warn); }

  .person-title{ font-family:'Fraunces',serif; font-size:24px; color:var(--navy); margin:4px 0 14px; }
  .loading{ text-align:center; color:var(--muted); padding:40px; }

  @media print{
    @page{ size:letter portrait; margin:.4in; }
    body{ background:#fff; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    *{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .no-print{ display:none !important; }
    .masthead{ background:#fff; color:var(--navy); }
    .club{ background:linear-gradient(160deg,#0E2440,#0A1A30) !important; color:#fff !important; border:1px solid rgba(194,161,77,.4) !important; }
    .club .eyebrow span{ color:var(--gold-soft) !important; }
    .club-k{ color:rgba(255,255,255,.55) !important; }
    .club-cell{ background:rgba(255,255,255,.06) !important; border:1px solid rgba(194,161,77,.18) !important; }
    .club-v,.club-bar-row,.club-bar-row b,.club-note{ color:#fff !important; }
    .bar{ background:rgba(255,255,255,.14) !important; }
    .card{ page-break-inside:avoid; }
    .pbreak{ page-break-before:always; }
    .report-section{ page-break-after:always; }
    .report-section:last-child{ page-break-after:auto; }
  }
  .print-header{ display:none; }
  @media print{
    .print-header{ display:flex !important; align-items:center; gap:14px; padding:2px 0 8px; border-bottom:2px solid var(--gold); margin-bottom:12px; }
    .print-header .ph-brand{ font-family:'Fraunces',serif; font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--navy); margin:0 0 2px; }
    .print-header .ph-slogan{ font-size:10px; color:var(--gold); font-style:italic; margin:0; }
    .cases-page{ page-break-before:always; }
    body{ font-size:10px; }
    .card{ padding:9px 11px; margin-bottom:7px; border:1px solid #ddd; }
    .person-title{ font-size:18px; margin:0 0 8px; }
    h2{ font-size:14px; margin:0 0 6px; }
    .eyebrow{ margin-bottom:4px; }
    .eyebrow span{ font-size:9px; }
    .myweek{ padding:9px 11px; }
    .mw-goal{ margin-bottom:4px; }
    .mw-g-top{ font-size:10px; margin-bottom:2px; }
    .mw-bar{ height:4px; }
    .mw-num b{ font-size:14px; }
    .mw-num span{ font-size:8px; }
    .rev-cell b{ font-size:15px; }
    table.grid th, table.grid td{ padding:3px 5px; font-size:9.5px; }
  }
  .mast-slogan{ font-size:12px; color:var(--gold-soft); font-style:italic; margin:6px 0 0; }
  @media print{
    .masthead{ background:#fff !important; color:var(--navy) !important; padding:0 0 8px !important; border-bottom:2px solid var(--gold) !important; }
    .mast-inner{ gap:12px; }
    .mast-logo{ height:46px !important; }
    .mast-text .brand{ color:var(--gold) !important; margin:0 0 2px; }
    .mast-text h1{ font-size:16px !important; margin:0 !important; color:var(--navy) !important; }
    .mast-slogan{ color:var(--gold) !important; font-size:10px; margin:2px 0 0 !important; }
  }
  .tscroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
  @media (max-width:600px){
    .masthead{ padding:18px 16px; }
    .mast-inner{ gap:14px; }
    .mast-logo{ height:46px; }
    .mast-text h1{ font-size:21px; }
    .mast-slogan{ font-size:11px; }
    .wrap{ padding:16px 13px 60px; }
    .controls{ gap:10px; }
    .ctrl{ flex:1 1 100%; }
    .ctrl select, .ctrl .btn{ width:100%; min-width:0; }
    .card{ padding:15px 14px; }
    h2{ font-size:19px; }
    .person-title{ font-size:20px; }
    .club-grid{ grid-template-columns:1fr 1fr; }
    .club-v{ font-size:18px; }
    .club-bar-row b{ font-size:16px; }
    table.grid th, table.grid td, table.lead th, table.lead td{ white-space:nowrap; }
  }
  @media print{ .tscroll{ overflow:visible !important; } }
</style>
</head>

<script>
/* ============================================================
   RWG Weekly Report — reads live from the Google Sheet
   ============================================================ */
const ENDPOINT = "https://script.google.com/macros/s/AKfycbyBkStY31dgbEIkVCMFcgfFtM_LbVAtOCrDnzw9tDYIeK7H8cL5xdsTJkBlxZGnaQTN/exec";
const REPORT_PASSPHRASE = "chairman2026";

const PEOPLE = ["Carlos A Temperan","Alejandro Mendieta","Jesus Zamora","Nelson Mompierre Jr.","Maryurie Estrada"];
const SPRINT = { goalTotal:1000000, weeks:25, startingFyc:160000, start:"2026-06-08" };
const PACE_PER_WEEK = (SPRINT.goalTotal - SPRINT.startingFyc) / SPRINT.weeks; // 33,600
const WEEKLY_PREMIUM_TARGET = 6000;

const FYC_PRODUCTS     = ["Whole Life","Term","Disability"];
const PREMIUM_PER_AMOUNT = 1/6, PREMIUM_PER_AUM = 1/500;
const PRODUCTS = ["Whole Life","Annuity","Investments","Term","LTC","Disability","Financial Plan"];
const SOURCE_PREMIUM = { "Pension Member (Regular)":1000, "Investment Plan":1000, "Pension Max":1000,
  "High Risk Member":2000, "Haven Life":500, "Natural Market (affluent)":2000, "COI/Referral":1000,
  "Current Client":0, "Other":0 };
const FIRM_SHARE = { "Nelson Mompierre Jr.":0.5 };  // partner-pool share; others = 1.0
const AGENT_GOALS = {
  "Carlos A Temperan":    { firstSched:7, firstHeld:5, opps:2, closingSched:2, closingRun:2, nbSub:1, nbClosed:1, closePremium:500 },
  "Alejandro Mendieta":   { firstSched:7, firstHeld:5, opps:2, closingSched:2, closingRun:2, nbSub:1, nbClosed:1, closePremium:500 },
  "Jesus Zamora":         { firstSched:7, firstHeld:5, opps:2, closingSched:2, closingRun:2, nbSub:1, nbClosed:1, closePremium:500 },
  "Nelson Mompierre Jr.": { firstSched:7, firstHeld:5, opps:2, closingSched:2, closingRun:2, nbSub:1, nbClosed:1, closePremium:1000 },
  "Maryurie Estrada":     { firstSched:7, firstHeld:5, opps:2, closingSched:2, closingRun:2, nbSub:1, nbClosed:1, closePremium:500 }
};

let DATA = { cases:[], weekly:[] };
let CURRENT_WEEK = "";

const num = v => { const n = parseFloat(v); return isNaN(n)?0:n; };
const money = n => "$" + Math.round(n||0).toLocaleString("en-US");
const esc = s => String(s==null?"":s).replace(/[&<>"]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));
function rowFyc(product, amt){ return FYC_PRODUCTS.indexOf(product)>=0 ? amt : 0; }
function firmShare(agent){ return FIRM_SHARE[agent]!=null ? FIRM_SHARE[agent] : 1.0; }
function ymd(v){ return String(v||"").slice(0,10); }

/* ── JSONP fetch ─────────────────────────────────────────── */
function jsonp(action, cb){
  const name = "rwg_rep_" + Math.random().toString(36).slice(2);
  const s = document.createElement("script");
  let done=false;
  function cleanup(){ try{ delete window[name]; }catch(e){ window[name]=undefined; } if(s.parentNode) s.parentNode.removeChild(s); }
  window[name] = function(d){ done=true; cleanup(); cb(d); };
  s.onerror = function(){ if(!done){ cleanup(); cb({ok:false}); } };
  s.src = ENDPOINT + "?action=" + action + "&callback=" + name + "&_=" + Date.now();
  document.body.appendChild(s);
  setTimeout(function(){ if(!done){ cleanup(); cb({ok:false,error:"timeout"}); } }, 15000);
}

function loadData(){
  document.getElementById("report-body").innerHTML = '<div class="loading">Loading the team\'s numbers…</div>';
  jsonp("getReport", function(resp){
    if(!resp || !resp.ok){ document.getElementById("report-body").innerHTML = '<div class="loading">Could not load. Check the connection and refresh.</div>'; return; }
    DATA.cases  = resp.cases  || [];
    DATA.weekly = resp.weekly || [];
    buildControls();
    render();
  });
}

/* ── Week list ───────────────────────────────────────────── */
function allWeeks(){
  const set = {};
  DATA.cases.forEach(c => { if(c.week_ending) set[ymd(c.week_ending)] = 1; });
  DATA.weekly.forEach(w => { if(w.week_ending) set[ymd(w.week_ending)] = 1; });
  return Object.keys(set).sort().reverse();   // newest first
}

function buildControls(){
  const weeks = allWeeks();
  const wk = document.getElementById("weekSel");
  if(weeks.length){
    wk.innerHTML = weeks.map(function(w){
      const d = new Date(w+"T12:00:00");
      const mon = new Date(d); mon.setDate(d.getDate()-4);
      const fmt = x => x.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      return '<option value="'+w+'">Week of '+fmt(mon)+' – '+fmt(d)+'</option>';
    }).join("");
    if(!CURRENT_WEEK || weeks.indexOf(CURRENT_WEEK)<0) CURRENT_WEEK = weeks[0];
    wk.value = CURRENT_WEEK;
  } else {
    wk.innerHTML = '<option value="">No data yet</option>';
  }
  const who = document.getElementById("whoSel");
  who.innerHTML = '<option value="__team__">Entire Team</option>' +
    PEOPLE.map(function(p){ return '<option value="'+esc(p)+'">'+esc(p)+'</option>'; }).join("");
}

/* ── Case stats for a set of cases ───────────────────────── */
function caseStats(cases, week){
  const mix = {}; PRODUCTS.forEach(p => mix[p]={op:0,subN:0,sub:0,clN:0,cl:0});
  let opp=0,nbSub=0,nbClosed=0,revSub=0,revClosed=0,fycSub=0,aumSub=0,premClosed=0,potential=0,fycClosed=0,aumTotal=0;
  cases.forEach(function(c){
    const amt=num(c.amount), aum=num(c.aum), prod=c.product, src=c.source;
    // Attribute each milestone to the week it actually happened. With no week
    // filter, fall back to the case's current state (whole-dataset contexts).
    const ow = c.opened_week || ymd(c.week_ending);
    const sw = c.submitted_week || "";
    const cw = c.closed_week || "";
    const openedHere = week ? (ow===week) : (c.state==="Opened");
    const subHere    = week ? (sw===week) : (c.state==="Submitted");
    const closedHere = week ? (cw===week) : (c.state==="Closed");
    if(openedHere){ opp++; if(SOURCE_PREMIUM[src]) potential += SOURCE_PREMIUM[src]; if(mix[prod]) mix[prod].op++; }
    if(subHere){ nbSub++; revSub+=amt; fycSub+=rowFyc(prod,amt); aumSub+=aum; if(mix[prod]){mix[prod].subN++; mix[prod].sub+=amt;} }
    if(closedHere){ nbClosed++; revClosed+=amt; fycClosed+=rowFyc(prod,amt); premClosed += amt*PREMIUM_PER_AMOUNT + aum*PREMIUM_PER_AUM; aumTotal += aum; if(mix[prod]){mix[prod].clN++; mix[prod].cl+=amt;} }
  });
  return {mix,opp,nbSub,nbClosed,revSub,revClosed,fycSub,aumSub,premClosed,potential,fycClosed,aumTotal};
}

function casesFor(week, person){
  return DATA.cases.filter(function(c){
    if(person && c.submitting_agent!==person) return false;
    if(week){
      // A case belongs to a week if it was opened, submitted, or closed in it.
      const ow = c.opened_week || ymd(c.week_ending);
      if(ow!==week && (c.submitted_week||"")!==week && (c.closed_week||"")!==week) return false;
    }
    return true;
  });
}
function weeklyFor(week, person){
  return DATA.weekly.find(function(w){ return ymd(w.week_ending)===week && w.agent===person; }) || {};
}

/* ── Chairman's Club tracker ─────────────────────────────── */
function weeksElapsed(){
  const start = new Date(SPRINT.start+"T00:00:00");
  const diff = Math.floor((new Date() - start)/(7*86400000));
  return Math.max(0, Math.min(SPRINT.weeks, diff+1));
}
function clubYtd(){
  let ytd = SPRINT.startingFyc;
  DATA.cases.forEach(function(c){
    if(c.state==="Closed") ytd += rowFyc(c.product, num(c.amount)) * firmShare(c.submitting_agent);
  });
  return ytd;
}
function renderClub(week){
  const ytd = clubYtd();
  const pace = SPRINT.startingFyc + PACE_PER_WEEK * weeksElapsed();
  const gap = ytd - pace;
  // This week (partner pool)
  let weekFyc=0, weekPrem=0;
  casesFor(week, null).forEach(function(c){
    const sh = firmShare(c.submitting_agent);
    if((c.closed_week||"")===week)    weekFyc  += rowFyc(c.product, num(c.amount)) * sh;
    if((c.submitted_week||"")===week) weekPrem += (num(c.amount)*PREMIUM_PER_AMOUNT) * sh;
  });
  const pct = Math.min(100, Math.round(100*ytd/SPRINT.goalTotal));
  const premPct = Math.min(100, Math.round(100*weekPrem/WEEKLY_PREMIUM_TARGET));
  return '<section class="card club">'+
    '<div class="eyebrow"><span class="dot"></span><span>Chairman\'s Club 2026 &middot; Combined</span></div>'+
    '<div class="club-grid">'+
      '<div class="club-cell"><div class="club-k">FYC year-to-date</div><div class="club-v">'+money(ytd)+'</div></div>'+
      '<div class="club-cell"><div class="club-k">Pace to date</div><div class="club-v">'+money(pace)+'</div></div>'+
      '<div class="club-cell"><div class="club-k">Gap to pace</div><div class="club-v" style="color:'+(gap>=0?'var(--good)':'#FF8A80')+'">'+(gap>=0?'+':'')+money(gap)+'</div></div>'+
      '<div class="club-cell"><div class="club-k">Club goal</div><div class="club-v">'+money(SPRINT.goalTotal)+'</div></div>'+
    '</div>'+
    '<div class="club-bar-wrap"><div class="club-bar-row"><span>Toward $1,000,000 FYC</span><b>'+pct+'%</b></div>'+
      '<div class="bar"><div class="bar-fill" style="width:'+pct+'%"></div></div></div>'+
    '<div class="club-bar-wrap" style="margin-top:14px;"><div class="club-bar-row"><span>This week: premium written toward $6,000</span><b>'+money(weekPrem)+'</b></div>'+
      '<div class="bar"><div class="bar-fill" style="width:'+premPct+'%"></div></div></div>'+
    '<p class="club-note">This week added '+money(weekFyc)+' of FYC toward Club (partner pool, Nelson at 50%). YTD auto-computed from closed cases + $'+SPRINT.startingFyc.toLocaleString()+' booked at sprint start. Week '+weeksElapsed()+' of '+SPRINT.weeks+'.</p>'+
  '</section>';
}

/* ── My Week goals + four numbers for a person ───────────── */
function renderSnapshot(person, week, mode){
  const st = caseStats(casesFor(week, person), week);
  const wk = weeklyFor(week, person);
  const g = AGENT_GOALS[person] || {};
  const fmtc = (v,t)=> v+" / "+t;
  const rows = [
    {label:"First meetings scheduled", val:num(wk.first_appts_scheduled), target:g.firstSched||0, disp:fmtc(num(wk.first_appts_scheduled),g.firstSched||0)},
    {label:"First meetings held",      val:num(wk.first_appts_held),      target:g.firstHeld||0,  disp:fmtc(num(wk.first_appts_held),g.firstHeld||0)},
    {label:"Opportunities opened",     val:st.opp,                        target:g.opps||0,       disp:fmtc(st.opp,g.opps||0)},
    {label:"Closing meetings scheduled",val:num(wk.closing_appts_scheduled),target:g.closingSched||0,disp:fmtc(num(wk.closing_appts_scheduled),g.closingSched||0)},
    {label:"Closing meetings run",     val:num(wk.closing_appts_held),    target:g.closingRun||0,  disp:fmtc(num(wk.closing_appts_held),g.closingRun||0)},
    {label:"New business submitted",   val:st.nbSub,                      target:g.nbSub||0,       disp:fmtc(st.nbSub,g.nbSub||0)},
    {label:"New business closed",      val:st.nbClosed,                   target:g.nbClosed||0,    disp:fmtc(st.nbClosed,g.nbClosed||0)},
    {label:"Premium closed",           val:st.premClosed,                 target:g.closePremium||0,disp:money(st.premClosed)+" / "+money(g.closePremium||0), money:true}
  ];
  let met=0;
  const goalsHtml = rows.map(function(r){
    const pct = r.target>0 ? Math.min(100,Math.round(100*r.val/r.target)) : 100;
    const hit = r.val>=r.target && r.target>0; if(hit) met++;
    return '<div class="mw-goal'+(hit?' hit':'')+'">'+
      '<div class="mw-g-top"><span class="mw-g-label">'+r.label+'</span><span class="mw-g-val">'+r.disp+(hit?' &#10003;':'')+'</span></div>'+
      '<div class="mw-bar"><div class="mw-bar-fill" style="width:'+pct+'%"></div></div></div>';
  }).join("");
  const card = (AGENT_GOALS[person]) ?
    '<div class="myweek"><div class="mw-head"><span class="mw-title">My Week</span><span class="mw-summary'+(met===rows.length?' all':'')+'">'+met+' of '+rows.length+' met</span></div>'+goalsHtml+'</div>' : '';
  const nums = '<div class="mw-nums">'+
    '<div class="mw-num"><span>Open opportunities</span><b>'+st.opp+'</b></div>'+
    '<div class="mw-num"><span>FYC submitted</span><b>'+money(st.fycSub)+'</b></div>'+
    '<div class="mw-num"><span>AUM submitted</span><b>'+money(st.aumSub)+'</b></div>'+
    '<div class="mw-num"><span>Revenue closed</span><b>'+money(st.revClosed)+'</b></div></div>';
  const snapCard = '<section class="card"><div class="eyebrow"><span class="dot"></span><span>Live snapshot</span></div>'+card+nums+'</section>';
  if(mode==="print"){
    return '<h2 class="person-title">'+esc(person)+'</h2>' + snapCard + renderMix(st) + renderRevenue(st) +
      '<div class="cases-page">' + renderCasesList(casesFor(week, person)) + '</div>';
  }
  return '<div class="report-cols"><div>'+renderMix(st)+renderRevenue(st)+'</div><div>'+snapCard+'</div></div>' +
    renderCasesList(casesFor(week, person));
}

function renderRevenue(st){
  return '<section class="card"><div class="eyebrow"><span class="dot"></span><span>Revenue</span></div>'+
    '<div class="two">'+
      '<div class="rev-cell"><span>Revenue submitted</span><b>'+money(st.revSub)+'</b></div>'+
      '<div class="rev-cell"><span>Revenue closed</span><b>'+money(st.revClosed)+'</b></div>'+
    '</div></section>';
}

function renderMix(st){
  let tOp=0,tSubN=0,tSub=0,tClN=0,tCl=0;
  const rows = PRODUCTS.map(function(p){
    const m=st.mix[p]; tOp+=m.op; tSubN+=m.subN; tSub+=m.sub; tClN+=m.clN; tCl+=m.cl;
    return '<tr><td>'+p+'</td><td>'+(m.op||'')+'</td><td>'+(m.subN||'')+'</td><td>'+(m.sub?money(m.sub):'')+'</td><td>'+(m.clN||'')+'</td><td>'+(m.cl?money(m.cl):'')+'</td></tr>';
  }).join("");
  return '<section class="card"><div class="eyebrow"><span class="dot"></span><span>Product mix</span></div>'+
    '<div class="tscroll"><table class="grid"><thead><tr><th>Product</th><th># Opened</th><th># Subm.</th><th>$ Submitted</th><th># Closed</th><th>$ Closed</th></tr></thead>'+
    '<tbody>'+rows+'</tbody>'+
    '<tfoot><tr><td>Total</td><td>'+tOp+'</td><td>'+tSubN+'</td><td>'+money(tSub)+'</td><td>'+tClN+'</td><td>'+money(tCl)+'</td></tr></tfoot></table></div></section>';
}

let casesSortKey=null, casesSortDir=1;
const CASES_COLS = [
  {label:"Client", key:"client_name"},
  {label:"Source", key:"source"},
  {label:"Product", key:"product"},
  {label:"State", key:"state"},
  {label:"$ Amount", key:"amount", num:true},
  {label:"AUM", key:"aum", num:true},
  {label:"Agent", key:"submitting_agent"}
];
function renderCasesList(cases){
  if(!cases.length) return '<section class="card"><div class="eyebrow"><span class="dot"></span><span>Cases this week</span></div><p style="color:var(--muted);font-size:13px;">No cases logged.</p></section>';
  let view = cases.slice();
  if(casesSortKey){
    const isNum = CASES_COLS.some(function(c){ return c.key===casesSortKey && c.num; });
    view.sort(function(a,b){
      if(isNum) return (num(a[casesSortKey]) - num(b[casesSortKey])) * casesSortDir;
      const va=String(a[casesSortKey]||"").toLowerCase(), vb=String(b[casesSortKey]||"").toLowerCase();
      return va<vb ? -casesSortDir : (va>vb ? casesSortDir : 0);
    });
  }
  const th = CASES_COLS.map(function(col){
    const arrow = (casesSortKey===col.key) ? (casesSortDir>0?' ▲':' ▼') : '';
    return '<th class="cs-sort" data-sort="'+col.key+'">'+col.label+arrow+'</th>';
  }).join('');
  const rows = view.map(function(c){
    return '<tr><td>'+esc(c.client_name)+'</td><td>'+esc(c.source)+'</td><td>'+esc(c.product)+'</td><td>'+esc(c.state)+'</td><td>'+money(num(c.amount))+'</td><td>'+(num(c.aum)?money(num(c.aum)):'')+'</td><td>'+esc(c.submitting_agent)+'</td></tr>';
  }).join("");
  return '<section class="card"><div class="eyebrow"><span class="dot"></span><span>Cases this week</span></div>'+
    '<div class="tscroll"><table class="grid"><thead><tr>'+th+'</tr></thead><tbody>'+rows+'</tbody></table></div></section>';
}

/* ── Team report ─────────────────────────────────────────── */
function renderTeam(week){
  const all = caseStats(casesFor(week, null), week);
  const totals = '<section class="card"><div class="eyebrow"><span class="dot"></span><span>Team totals this week</span></div>'+
    '<div class="mw-nums">'+
      '<div class="mw-num"><span>Open opportunities</span><b>'+all.opp+'</b></div>'+
      '<div class="mw-num"><span>FYC submitted</span><b>'+money(all.fycSub)+'</b></div>'+
      '<div class="mw-num"><span>AUM submitted</span><b>'+money(all.aumSub)+'</b></div>'+
      '<div class="mw-num"><span>Revenue closed</span><b>'+money(all.revClosed)+'</b></div>'+
    '</div></section>';
  // Leaderboard
  const lead = PEOPLE.map(function(p){
    const st = caseStats(casesFor(week, p), week);
    const wk = weeklyFor(week, p);
    const g = AGENT_GOALS[p]||{};
    const goalsHit = [
      num(wk.first_appts_scheduled)>=(g.firstSched||0)&&g.firstSched,
      num(wk.first_appts_held)>=(g.firstHeld||0)&&g.firstHeld,
      st.opp>=(g.opps||0)&&g.opps,
      num(wk.closing_appts_scheduled)>=(g.closingSched||0)&&g.closingSched,
      num(wk.closing_appts_held)>=(g.closingRun||0)&&g.closingRun,
      st.nbSub>=(g.nbSub||0)&&g.nbSub,
      st.nbClosed>=(g.nbClosed||0)&&g.nbClosed,
      st.premClosed>=(g.closePremium||0)&&g.closePremium
    ].filter(Boolean).length;
    const ok = goalsHit>=8;
    return '<tr><td>'+esc(p)+'</td>'+
      '<td><span class="pill '+(ok?'good':'warn')+'">'+goalsHit+'/8</span></td>'+
      '<td>'+st.opp+'</td><td>'+st.nbSub+'</td><td>'+st.nbClosed+'</td>'+
      '<td>'+money(st.premClosed)+'</td><td>'+money(st.fycClosed)+'</td><td>'+money(st.aumTotal)+'</td></tr>';
  }).join("");
  const leadCard = '<section class="card"><div class="eyebrow"><span class="dot"></span><span>By person this week</span></div>'+
    '<div class="tscroll"><table class="lead"><thead><tr><th>Agent</th><th>Goals</th><th>Opps</th><th>Subm.</th><th>Closed</th><th>Premium</th><th>FYC closed</th><th>AUM</th></tr></thead><tbody>'+lead+'</tbody></table></div></section>';
  return totals + leadCard + '<div class="pbreak">'+renderMix(all)+'</div>' + renderCasesList(casesFor(week, null));
}

/* ── Render the current selection ────────────────────────── */
function render(){
  CURRENT_WEEK = document.getElementById("weekSel").value;
  const who = document.getElementById("whoSel").value;
  let html = renderClub(CURRENT_WEEK);
  if(who==="__team__"){
    html += '<h2 class="person-title">Entire Team</h2>' + renderTeam(CURRENT_WEEK);
  } else {
    html += '<h2 class="person-title">'+esc(who)+'</h2>' + renderSnapshot(who, CURRENT_WEEK);
  }
  document.getElementById("report-body").innerHTML = html;
}

function printHeader(){
  const logo = (document.getElementById("gate-logo")||{}).src || "";
  return '<div class="print-header"><img src="'+logo+'" alt="RWG"><div>'+
    '<p class="ph-brand">Resilient Wealth Group</p>'+
    '<p class="ph-slogan">Wealth, Conducted with Purpose</p></div></div>';
}

/* ── Print all: every person + team, page-broken ─────────── */
function renderAll(){
  const week = document.getElementById("weekSel").value;
  let html = '<div class="report-section">'+renderClub(week)+'<h2 class="person-title">Entire Team</h2>'+renderTeam(week)+'</div>';
  PEOPLE.forEach(function(p){
    html += '<div class="report-section">'+renderSnapshot(p, week, "print")+'</div>';
  });
  return html;
}

/* ── Wire up ─────────────────────────────────────────────── */
document.getElementById("weekSel").addEventListener("change", render);
document.getElementById("report-body").addEventListener("click", function(e){
  const h = e.target.closest(".cs-sort");
  if(!h) return;
  const k = h.getAttribute("data-sort");
  if(casesSortKey===k) casesSortDir = -casesSortDir; else { casesSortKey = k; casesSortDir = 1; }
  render();
});
document.getElementById("whoSel").addEventListener("change", render);
document.getElementById("refresh").addEventListener("click", loadData);
document.getElementById("printThis").addEventListener("click", function(){
  const who = document.getElementById("whoSel").value;
  const week = document.getElementById("weekSel").value;
  const body = document.getElementById("report-body");
  const saved = body.innerHTML;
  if(who==="__team__"){
    body.innerHTML = renderClub(week)+'<h2 class="person-title">Entire Team</h2>'+renderTeam(week);
  } else {
    body.innerHTML = renderSnapshot(who, week, "print");
  }
  window.print();
  setTimeout(function(){ body.innerHTML = saved; }, 1500);
});
document.getElementById("printAll").addEventListener("click", function(){
  const body = document.getElementById("report-body");
  const saved = body.innerHTML;
  body.innerHTML = renderAll();
  window.print();
  setTimeout(function(){ body.innerHTML = saved; }, 1500);
});

/* ── Gate ────────────────────────────────────────────────── */
(function(){
  const gate=document.getElementById("gate"), inp=document.getElementById("gate-input"), btn=document.getElementById("gate-btn"), err=document.getElementById("gate-err");
  function attempt(){
    if(inp.value===REPORT_PASSPHRASE){ gate.style.display="none"; loadData(); }
    else { err.textContent="Incorrect passphrase."; inp.value=""; inp.focus(); }
  }
  btn.addEventListener("click", attempt);
  inp.addEventListener("keydown", e=>{ if(e.key==="Enter") attempt(); });
  inp.focus();
})();
</script>
